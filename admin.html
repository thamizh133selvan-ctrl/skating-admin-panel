<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Grace Roller Skating</title>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
   body {
      font-family: Arial;
      background: #050a1a;
      color: white;
      padding: 20px;
    }

    h1 { text-align: center; color: gold; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      flex-wrap: wrap;
      gap: 10px;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
      border: none;
      background: gold;
      font-weight: bold;
      
    }

    .category {
      margin-bottom: 40px;
      padding: 20px;
      background: #0a1535;
      border-radius: 10px;
      border: 1px solid gold;
      overflow:auto;
    }

    table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid gold;
  padding: 8px;
  text-align: center;
  word-break: break-word;
}

    th, td {
      border: 1px solid gold;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #111c44;
      color: gold;
    }
  </style>
</head>

<body>

<h1>🏆 Admin Panel - Grace Roller Skating 2026</h1>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search by Name..." oninput="filterStudents()">
  <button onclick="exportExcel()">Export to Excel</button>
</div>

<div id="searchResults"></div>
<div id="data"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCha_pfcRqCVOAPcsqyNolVd72S7asBSh0",
  authDomain: "grace-skating-240af.firebaseapp.com",
  projectId: "grace-skating-240af",
  storageBucket: "grace-skating-240af.firebasestorage.app",
  messagingSenderId: "850252446428",
  appId: "1:850252446428:web:2c3b1c8fe9bf9a91f69219",
  measurementId: "G-5FGE3HLHMW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allStudents = [];


// 🔥 UNIVERSAL AGE FUNCTION
function calculateAge(dobString) {

  if (!dobString) return null;

  let day, month, year;

  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(dobString)) {
    const birthDate = new Date(dobString);
    if (isNaN(birthDate)) return null;

    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
      age--;
    }

    return age;
  }

  // DD-MM-YYYY or DD/MM/YYYY
  if (dobString.includes("-") || dobString.includes("/")) {

    const separator = dobString.includes("-") ? "-" : "/";
    const parts = dobString.split(separator);

    if (parts.length !== 3) return null;

    day = parts[0].padStart(2, "0");
    month = parts[1].padStart(2, "0");
    year = parts[2];

    const formattedDOB = `${year}-${month}-${day}`;
    const birthDate = new Date(formattedDOB);

    if (isNaN(birthDate)) return null;

    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
      age--;
    }

    return age;
  }

  return null;
}


async function loadData() {

  const snapshot = await getDocs(collection(db, "registrations"));

  const grouped = {};
  allStudents = [];

  snapshot.forEach(docSnap => {

    const data = docSnap.data();
    data.id = docSnap.id;

    // 🔥 CALCULATE AGE
    const age = calculateAge(data.dob);
    data.calculatedAge = age;

    allStudents.push(data);

    if (data.disciplines) {

      data.disciplines.forEach(rink => {

        if (!grouped[rink]) {
          grouped[rink] = {};
        }

        const ageKey = age !== null ? age : "Unknown";

        if (!grouped[rink][ageKey]) {
          grouped[rink][ageKey] = { Male: [], Female: [] };
        }

        if (data.gender === "Male") {
          grouped[rink][ageKey].Male.push(data);
        } else {
          grouped[rink][ageKey].Female.push(data);
        }

      });
    }

  });

  displayGrouped(grouped);
}
function downloadFile(base64, filename) {
  const link = document.createElement("a");
  link.href = base64;
  link.download = filename;
  link.click();
}


function createTable(students) {

  if (!students || students.length === 0) {
    return "<p>No Data</p>";
  }

  let table = `
    <table>
      <tr>
        <th>Name</th>
        <th>DOB</th>
        <th>Age</th>
        <th>School</th>
        <th>Phone</th>
        <th>Disciplines</th>
        <th>Aadhar Proof</th>
        <th>Birth Certificate</th>
        <th>Payment Screenshot</th>
        <th>Action<th>
      </tr>
  `;

  students.forEach(student => {

    table += `
      <tr>
        <td>${student.name}</td>
        <td>${student.dob || "N/A"}</td>
        <td>${student.calculatedAge !== null ? student.calculatedAge : "N/A"}</td>
        <td>${student.schoolName}</td>
        <td>${student.primaryPhone}</td>
        <td>${student.disciplines?.join(", ") || "N/A"}</td>
<td>
  <button onclick="downloadFile('${student.aadharFile}', 'Aadhar')">
    Download
  </button>
</td>

<td>
  <button onclick="downloadFile('${student.birthFile}', 'Birth')">
    Download
  </button>
</td>

<td>
  <button onclick="downloadFile('${student.paymentFile}', 'Payment')">
    Download
  </button>
</td>

<td>
  <button onclick="deleteStudent('${student.id}')">
    Delete
  </button>
</td>
</tr>`;
  });

  table += "</table>";
  return table;
}


function displayGrouped(grouped) {

  const container = document.getElementById("data");
  container.innerHTML = "";

  for (let rink in grouped) {

    const rinkDiv = document.createElement("div");
    rinkDiv.className = "category";
    rinkDiv.innerHTML = `<h2>🏁 ${rink}</h2>`;

    for (let age in grouped[rink]) {

      rinkDiv.innerHTML += `<h3>Age ${age}</h3>`;

      rinkDiv.innerHTML += `<h4>👦 Boys</h4>`;
      rinkDiv.innerHTML += createTable(grouped[rink][age].Male);

      rinkDiv.innerHTML += `<h4>👧 Girls</h4>`;
      rinkDiv.innerHTML += createTable(grouped[rink][age].Female);
    }

    container.appendChild(rinkDiv);
  }
}
window.downloadFile = function(base64, filename) {
  if (!base64) {
    alert("File not available");
    return;
  }

  const link = document.createElement("a");
  link.href = base64;
  link.download = filename;
  link.click();
};


window.deleteStudent = async function(id) {
  if (!confirm("Delete this entry?")) return;
  await deleteDoc(doc(db, "registrations", id));
  alert("Deleted Successfully");
  location.reload();
};


window.filterStudents = function () {

  const value = document.getElementById("search").value.toLowerCase();
  const results = document.getElementById("searchResults");
  const dataDiv = document.getElementById("data");

  if (value === "") {
    results.innerHTML = "";
    dataDiv.style.display = "block";
    return;
  }

  dataDiv.style.display = "none";

  const matched = allStudents.filter(s =>
    s.name.toLowerCase().includes(value)
  );

  results.innerHTML = createTable(matched);
};


window.exportExcel = function() {
  const worksheet = XLSX.utils.json_to_sheet(allStudents);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Registrations");
  XLSX.writeFile(workbook, "Grace_Roller_Skating.xlsx");
};

loadData();

</script>

</body>
</html>
